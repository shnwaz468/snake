<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="eyebrow">Classic Arcade</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </div>

        <div class="status-row">
          <p id="status">Press Start to play.</p>
          <div class="actions">
            <button id="start-button" type="button">Start</button>
            <button id="pause-button" type="button">Pause</button>
            <button id="restart-button" type="button">Restart</button>
          </div>
        </div>

        <div class="game-shell">
          <div
            id="board"
            class="board"
            role="grid"
            aria-label="Snake game board"
          ></div>
        </div>

        <section class="controls" aria-label="Controls">
          <p>Arrow keys/WASD, swipe on board, or use the touch pad. Space or P pauses.</p>
          <div class="controls__pad">
            <button
              class="control-button control-button--up"
              data-direction="UP"
              type="button"
              aria-label="Move up"
            >
              UP
            </button>
            <button
              class="control-button control-button--left"
              data-direction="LEFT"
              type="button"
              aria-label="Move left"
            >
              LEFT
            </button>
            <button
              class="control-button control-button--down"
              data-direction="DOWN"
              type="button"
              aria-label="Move down"
            >
              DOWN
            </button>
            <button
              class="control-button control-button--right"
              data-direction="RIGHT"
              type="button"
              aria-label="Move right"
            >
              RIGHT
            </button>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
